<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navbar - SportSwear</title>
    <link rel="stylesheet" href="css/navbar.css">
  </head>
  <body>
    <header class="navbar">
      <div class="navbar-left">
        <div class="brand">
          <div class="brand-logo">S</div>
          <div class="brand-name">SportSwear</div>
        </div>

        <div class="search">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden>
            <path d="M21 21l-4.35-4.35" stroke="#9AA0A6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="11" cy="11" r="6" stroke="#9AA0A6" stroke-width="1.5"/>
          </svg>
          <input type="search" placeholder="Buscar productos ..." aria-label="Buscar productos">
        </div>
      </div>

      <nav class="navbar-right">
        <a class="nav-link" href="#">Productos</a>
        <a class="nav-link" href="#">Hombre</a>
        <a class="nav-link" href="#">Mujer</a>

        <button class="icon-btn" aria-label="Carrito">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 6h15l-1.5 9h-12z" stroke="#111" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="10" cy="19" r="1" fill="#111"/>
            <circle cx="18" cy="19" r="1" fill="#111"/>
          </svg>
        </button>

        <button class="icon-btn" aria-label="Cuenta">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="3" stroke="#111" stroke-width="1.2"/>
            <path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="#111" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>

        <a class="btn-ghost" href="#">Ver Tienda</a>
      </nav>
    </header>
  </body>
</html>
